[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True
show_error_codes = True

[mypy-src.regime.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

# Mixed alert payloads and optional channel handlers still confuse arg narrowing here.
[mypy-src.regime.alerts]
disable_error_code = arg-type, attr-defined

# Backtest result objects carry nullable fields through benchmark comparisons.
[mypy-src.regime.backtest]
disable_error_code = union-attr

# Broker adapter mutates dynamic dict payloads during order normalization.
[mypy-src.regime.broker_adapter]
disable_error_code = assignment

# Plotly trace builders return dynamic dict structures that mypy treats as Any.
[mypy-src.regime.charts]
disable_error_code = no-any-return

# CLI parsing mixes argparse namespaces and typed config dicts.
[mypy-src.regime.cli]
disable_error_code = arg-type, index, attr-defined

# Weekly digest assembly passes heterogeneous summary rows into formatters.
[mypy-src.regime.digest]
disable_error_code = arg-type

# hmmlearn/scipy model calls return broader types than the engine annotations express.
[mypy-src.regime.hmm_engine]
disable_error_code = return-value

# IB connection code bridges thread-owned backends, optional imports, and dynamic reconnect state.
[mypy-src.regime.ib_connection]
disable_error_code = arg-type, attr-defined, return-value, name-defined, assignment

[mypy-src.regime.ib_live_backend]
ignore_errors = True

# IB order translation works with partially-typed broker payloads from ib_insync.
[mypy-src.regime.ib_order_translator]
disable_error_code = arg-type

# IB thread dispatch stores loop/future state that depends on runtime initialization.
[mypy-src.regime.ib_thread]
disable_error_code = union-attr, var-annotated, arg-type

# IBKR market data provider builds pandas frames from dynamic bar objects and settings dicts.
[mypy-src.regime.ibkr_market_data]
disable_error_code = no-any-return, dict-item, assignment

[mypy-src.regime.llm_layer]
ignore_errors = True

# Meta-labeler training uses xgboost outputs whose wrapper types are still loose.
[mypy-src.regime.meta_labeler]
disable_error_code = union-attr

# Notification dispatch returns mixed bool/string delivery states by channel.
[mypy-src.regime.notifications]
disable_error_code = no-any-return

# OOB watchdog combines subprocess-style operational checks with dynamic config state.
[mypy-src.regime.oob_watchdog]
disable_error_code = arg-type, assignment, operator

[mypy-src.regime.paper_trading]
ignore_errors = True

[mypy-src.regime.persistence]
ignore_errors = True

# Scheduled runner orchestrates loosely typed runtime hooks and alert payloads.
[mypy-src.regime.scheduled_runner]
disable_error_code = attr-defined

[mypy-src.regime.streamlit_app]
ignore_errors = True

[mypy-src.importers.adapters]
ignore_errors = True
