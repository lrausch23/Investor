[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True
show_error_codes = True

[mypy-src.regime.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = True

[mypy-src.regime.alerts]
ignore_errors = True

